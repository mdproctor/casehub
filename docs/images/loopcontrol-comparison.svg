<svg width="820" height="380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="380" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">What Changes at the Hook Point</text>

  <!-- Divider -->
  <line x1="410" y1="50" x2="410" y2="350" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ══ LEFT COLUMN: ChoreographyLoopControl ══ -->

  <text x="205" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Without casehub-blackboard</text>
  <text x="205" y="84" text-anchor="middle" font-size="11" fill="#64748b">ChoreographyLoopControl (default)</text>

  <!-- Input: eligible bindings -->
  <rect x="80" y="100" width="250" height="36" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="205" y="123" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">eligible Bindings [ B1, B2, B3 ]</text>

  <line x1="205" y1="136" x2="205" y2="168" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ChoreographyLoopControl box -->
  <rect x="80" y="170" width="250" height="60" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="205" y="193" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">ChoreographyLoopControl</text>
  <text x="205" y="211" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">return Uni.createFrom().item(eligible)</text>
  <text x="205" y="225" text-anchor="middle" font-size="10" fill="#166534">— identity function —</text>

  <line x1="205" y1="230" x2="205" y2="262" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="80" y="264" width="250" height="36" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="205" y="287" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">selected [ B1, B2, B3 ] — all fire</text>

  <!-- Result label -->
  <text x="205" y="330" text-anchor="middle" font-size="11" fill="#64748b">Pure choreography:</text>
  <text x="205" y="346" text-anchor="middle" font-size="11" fill="#64748b">every eligible binding fires every cycle</text>


  <!-- ══ RIGHT COLUMN: PlanningStrategyLoopControl ══ -->

  <text x="615" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">With casehub-blackboard</text>
  <text x="615" y="84" text-anchor="middle" font-size="11" fill="#64748b">PlanningStrategyLoopControl (@Alternative)</text>

  <!-- Input: eligible bindings -->
  <rect x="490" y="100" width="250" height="36" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="615" y="123" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">eligible Bindings [ B1, B2, B3 ]</text>

  <line x1="615" y1="136" x2="615" y2="154" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 1: Build PlanItems, deduplicate -->
  <rect x="490" y="156" width="250" height="34" rx="5" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/>
  <text x="615" y="175" text-anchor="middle" font-size="10" fill="#92400e">① build PlanItems, deduplicate</text>
  <text x="615" y="187" text-anchor="middle" font-size="10" fill="#92400e">   (activeByBinding index)</text>

  <line x1="615" y1="190" x2="615" y2="204" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Step 2: StageLifecycleEvaluator -->
  <rect x="490" y="206" width="250" height="34" rx="5" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/>
  <text x="615" y="225" text-anchor="middle" font-size="10" fill="#92400e">② StageLifecycleEvaluator</text>
  <text x="615" y="237" text-anchor="middle" font-size="10" fill="#92400e">   activate/terminate stages → events</text>

  <line x1="615" y1="240" x2="615" y2="254" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Step 3: PlanningStrategy.select() -->
  <rect x="490" y="256" width="250" height="34" rx="5" fill="#fff7ed" stroke="#d97706" stroke-width="2"/>
  <text x="615" y="275" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">③ planningStrategy.select()</text>
  <text x="615" y="287" text-anchor="middle" font-size="10" fill="#92400e">   Uni — can query EventLog, call LLMs</text>

  <line x1="615" y1="290" x2="615" y2="304" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output: subset -->
  <rect x="490" y="306" width="250" height="36" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="615" y="329" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">selected [ B2 ] — strategy chose one</text>

  <!-- Result label -->
  <text x="615" y="358" text-anchor="middle" font-size="11" fill="#64748b">Orchestrated: deliberate selection,</text>
  <text x="615" y="372" text-anchor="middle" font-size="11" fill="#64748b">stage-aware, async-capable</text>
</svg>
